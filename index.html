<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD Data Siswa (Direct Firebase)</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        button.btn-delete { background-color: #e74c3c; }
        button.btn-delete:hover { background-color: #c0392b; }
        button.btn-edit { background-color: #f1c40f; color: #333; margin-right: 5px; }
        button.btn-edit:hover { background-color: #d4ac0d; }
        button.btn-cancel { background-color: #95a5a6; margin-left: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #2c3e50; }
        .loading { display: none; color: #7f8c8d; font-style: italic; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manajemen Data Siswa</h2>
    
    <form id="siswaForm">
        <input type="hidden" id="studentId">
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" required placeholder="Contoh: Ahmad Fauzi">
        </div>
        <div class="form-group">
            <label for="kelas">Kelas</label>
            <input type="text" id="kelas" required placeholder="Contoh: XI-MIPA-1">
        </div>
        <div class="form-group">
            <label for="nisn">NISN</label>
            <input type="text" id="nisn" required placeholder="Contoh: 0045678912">
        </div>
        <button type="submit" id="submitBtn">Simpan Data</button>
        <button type="button" id="cancelBtn" class="btn-cancel" style="display:none;">Batal</button>
    </form>

    <div id="loadingInfo" class="loading">Memproses data... Mohon tunggu...</div>

    <table id="siswaTable">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Kelas</th>
                <th>NISN</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="siswaData">
            </tbody>
    </table>
</div>

<script type="module">
    // Impor fungsi spesifik dari Firebase SDK melalui CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ⚠️ GANTI OBJECT INI DENGAN FIREBASE CONFIG DARI LANGKAH 1
    const firebaseConfig = {
      	apiKey: "AIzaSyCLNOTiPXLOuAxtLb5qFVRatiNZwN9glL8",
  	authDomain: "absenqr-68c0c.firebaseapp.com",
  	projectId: "absenqr-68c0c",
  	storageBucket: "absenqr-68c0c.firebasestorage.app",
  	messagingSenderId: "693176639357",
  	appId: "1:693176639357:web:0fafa7f218271356613614",
    };

    // Inisialisasi Firebase dan Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const koleksiSiswa = collection(db, "Siswa");

    // Deklarasi Elemen DOM
    const form = document.getElementById('siswaForm');
    const loadingInfo = document.getElementById('loadingInfo');
    const tbody = document.getElementById('siswaData');
    const cancelBtn = document.getElementById('cancelBtn');

    // 1. READ: Memuat data dari Firestore
    async function muatData() {
        loadingInfo.style.display = 'block';
        tbody.innerHTML = '';
        try {
            const snapshot = await getDocs(koleksiSiswa);
            if (!snapshot.empty) {
                snapshot.forEach((dokumen) => {
                    const siswa = dokumen.data();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${siswa.nama}</td>
                        <td>${siswa.kelas}</td>
                        <td>${siswa.nisn}</td>
                        <td>
                            <button class="btn-edit" data-id="${dokumen.id}" data-nama="${siswa.nama}" data-kelas="${siswa.kelas}" data-nisn="${siswa.nisn}">Edit</button>
                            <button class="btn-delete" data-id="${dokumen.id}">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada data siswa.</td></tr>';
            }
        } catch (error) {
            console.error("Gagal memuat data: ", error);
            alert("Gagal memuat data dari database.");
        } finally {
            loadingInfo.style.display = 'none';
        }
    }

    // 2. CREATE & UPDATE: Menyimpan data ke Firestore
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        loadingInfo.style.display = 'block';
        
        const id = document.getElementById('studentId').value;
        const dataSiswa = {
            nama: document.getElementById('nama').value,
            kelas: document.getElementById('kelas').value,
            nisn: document.getElementById('nisn').value
        };

        try {
            if (id) {
                // UPDATE
                const referensiDokumen = doc(db, "Siswa", id);
                await updateDoc(referensiDokumen, dataSiswa);
            } else {
                // CREATE
                await addDoc(koleksiSiswa, dataSiswa);
            }
            resetForm();
            muatData();
        } catch (error) {
            console.error("Gagal menyimpan: ", error);
            alert("Gagal menyimpan data.");
        } finally {
            loadingInfo.style.display = 'none';
        }
    });

    // 3. Persiapan Edit & Hapus (Menggunakan Event Delegation)
    tbody.addEventListener('click', async (e) => {
        if (e.target.classList.contains('btn-edit')) {
            // Logika Edit
            document.getElementById('studentId').value = e.target.getAttribute('data-id');
            document.getElementById('nama').value = e.target.getAttribute('data-nama');
            document.getElementById('kelas').value = e.target.getAttribute('data-kelas');
            document.getElementById('nisn').value = e.target.getAttribute('data-nisn');
            
            document.getElementById('submitBtn').innerText = "Perbarui Data";
            cancelBtn.style.display = 'inline-block';
        } 
        
        else if (e.target.classList.contains('btn-delete')) {
            // Logika Hapus
            if (confirm("Apakah Anda yakin ingin menghapus data siswa ini?")) {
                loadingInfo.style.display = 'block';
                const id = e.target.getAttribute('data-id');
                try {
                    const referensiDokumen = doc(db, "Siswa", id);
                    await deleteDoc(referensiDokumen);
                    muatData();
                } catch (error) {
                    console.error("Gagal menghapus: ", error);
                    alert("Gagal menghapus data.");
                } finally {
                    loadingInfo.style.display = 'none';
                }
            }
        }
    });

    // 4. Logika Tombol Batal
    cancelBtn.addEventListener('click', resetForm);

    function resetForm() {
        form.reset();
        document.getElementById('studentId').value = '';
        document.getElementById('submitBtn').innerText = "Simpan Data";
        cancelBtn.style.display = 'none';
    }

    // Jalankan pemuatan awal
    muatData();
</script>
</body>
</html>
