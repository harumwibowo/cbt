<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - CBT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK & Config -->
    <script type="module">
        // Tempelkan konfigurasi Firebase Anda di sini
        const firebaseConfig = {
            apiKey: "AIzaSyCLNOTiPXLOuAxtLb5qFVRatiNZwN9glL8",
  authDomain: "absenqr-68c0c.firebaseapp.com",
  projectId: "absenqr-68c0c",
  storageBucket: "absenqr-68c0c.firebasestorage.app",
  messagingSenderId: "693176639357",
  appId: "1:693176639357:web:0fafa7f218271356613614",
        };
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadUsers() {
            const querySnapshot = await getDocs(collection(db, "users"));
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const user = doc.data();
                tbody.innerHTML += `<tr class="border-b">
                    <td class="py-2">${user.username}</td>
                    <td class="py-2">${user.fullname}</td>
                    <td class="py-2">${user.role}</td>
                </tr>`;
            });
        }

        loadUsers();

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "users"), {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    fullname: document.getElementById('fullname').value,
                    role: document.getElementById('role').value
                });
                showToast('Data berhasil disimpan!');
                setTimeout(() => location.reload(), 1000);
            } catch (error) {
                showToast('Gagal menyimpan data.');
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <aside class="w-64 bg-slate-800 text-white p-6">
            <h2 class="text-2xl font-bold mb-10">CBT Admin</h2>
            <nav>
                <div class="mb-4">
                    <p class="text-gray-400 uppercase text-xs font-semibold mb-2">Data Master</p>
                    <a href="#" class="block py-2 px-4 bg-blue-600 rounded">Pengguna</a>
                </div>
            </nav>
        </aside>
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-semibold mb-6">Tambah Pengguna</h1>
            <div class="bg-white p-6 rounded-lg shadow-md max-w-lg mb-8">
                <form id="userForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium">Username</label>
                        <input type="text" id="username" class="w-full border rounded p-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Password</label>
                        <input type="password" id="password" class="w-full border rounded p-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Nama Lengkap</label>
                        <input type="text" id="fullname" class="w-full border rounded p-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Peran</label>
                        <select id="role" class="w-full border rounded p-2">
                            <option value="Admin">Admin</option>
                            <option value="Guru">Guru</option>
                        </select>
                    </div>
                    <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Simpan</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Daftar Pengguna</h2>
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b">
                            <th class="py-2">Username</th>
                            <th class="py-2">Nama</th>
                            <th class="py-2">Peran</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>

            <!-- Toast Status -->
            <div id="toast" class="hidden fixed bottom-5 right-5 bg-green-500 text-white px-6 py-3 rounded shadow-lg"></div>
        </main>
    </div>
</body>
</html>
