<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TEMPEL KONFIGURASI FIREBASE DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSyCLNOTiPXLOuAxtLb5qFVRatiNZwN9glL8",
            authDomain: "absenqr-68c0c.firebaseapp.com",
            projectId: "absenqr-68c0c",
            storageBucket: "absenqr-68c0c.firebasestorage.app",
            messagingSenderId: "693176639357",
            appId: "1:693176639357:web:0fafa7f218271356613614"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.togglePassword = () => {
            const pass = document.getElementById('password');
            pass.type = pass.type === 'password' ? 'text' : 'password';
        }

        window.handleLogin = async (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            try {
                // Mengambil data langsung dari dokumen Admin
                const collRef = collection(db, "Pengguna/Admin/Data");
                const q = query(collRef, where("username", "==", username));
                const querySnapshot = await getDocs(q);
                
                let found = false;
                querySnapshot.forEach((doc) => {
                    // Pastikan field di firestore sesuai dengan case-sensitive
                    // Cek nama field di firestore Anda, apakah "username" atau "Username"
                    if (doc.data().password === password) {
                        const userData = doc.data();
                        sessionStorage.setItem('user', JSON.stringify(userData));
                        showDashboard(userData);
                        found = true;
                    }
                });

                if (!found) {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: 'Username atau Password salah' });
                }
            } catch (e) {
                console.error("Error:", e);
                Swal.fire({ icon: 'error', title: 'Error', text: e.message });
            }
        }

        window.showDashboard = (user) => {
            document.body.innerHTML = `
                <div class="flex min-h-screen bg-gray-100">
                    <div class="w-64 bg-slate-900 text-white p-6">
                        <h1 class="text-xl font-bold mb-10">CBT Admin</h1>
                        <nav>
                            <a href="#" class="block py-2.5 px-4 bg-blue-600 rounded">Dasbor</a>
                        </nav>
                    </div>
                    <div class="flex-1 p-10">
                        <div class="bg-white p-6 rounded-xl shadow">
                            <h2 class="text-2xl font-bold mb-4">Dasbor Admin</h2>
                            <p><strong>Nama:</strong> ${user.Nama_Lengkap}</p>
                            <p><strong>Peran:</strong> ${user.Peran}</p>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="app" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md transition-all duration-500 hover:shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center">Login CBT</h2>
        <div class="flex mb-6 border-b">
            <button class="flex-1 py-2 border-b-2 border-blue-500 font-bold">Admin</button>
            <button class="flex-1 py-2 text-gray-400">Siswa</button>
        </div>
        <form onsubmit="handleLogin(event)">
            <input id="username" type="text" placeholder="Username" class="w-full p-3 mb-4 border rounded-lg" required>
            <div class="relative mb-6">
                <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded-lg" required>
                <span onclick="togglePassword()" class="absolute right-3 top-3.5 cursor-pointer">👁️</span>
            </div>
            <button class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">Masuk</button>
        </form>
    </div>
</body>
</html>
